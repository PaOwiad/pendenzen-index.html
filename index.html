<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pendenzen">
<meta name="theme-color" content="#ffffff">
<title>Pendenzen</title>

<!-- PWA Manifest inline -->
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Pendenzen%22%2C%22short_name%22%3A%22Pendenzen%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f2f0ec%22%2C%22theme_color%22%3A%22%23ffffff%22%2C%22start_url%22%3A%22.%22%7D">

<style>
:root {
  --bg: #f2f0ec;
  --surface: #ffffff;
  --surface2: #f8f7f5;
  --border: #e4e0d9;
  --border2: #ccc8c0;
  --text: #1c1a18;
  --text2: #6b6860;
  --text3: #9b9890;
  --red: #dc2626;
  --green: #059669;
  --blue: #2563eb;
  --amber: #d97706;
  --radius: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; font-size: 15px;
  overscroll-behavior: none;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  padding-top: calc(12px + var(--safe-top));
  position: sticky; top: 0; z-index: 100;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
.header-right { display: flex; gap: 8px; align-items: center; }
.badge {
  background: var(--red); color: white;
  font-size: 11px; font-weight: 700;
  padding: 2px 8px; border-radius: 99px; min-width: 22px; text-align: center;
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text3); flex-shrink: 0;
  transition: background .3s;
}
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.ok      { background: var(--green); }
.sync-dot.err     { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.icon-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 10px;
  font-size: 13px; color: var(--text2);
  cursor: pointer; font-family: inherit;
}
.icon-btn:active { background: var(--border); }

/* ── FILTER ──────────────────────────────────────────────────────── */
.filter-strip {
  display: flex; gap: 6px; padding: 8px 16px 0;
  overflow-x: auto; scrollbar-width: none;
}
.filter-strip::-webkit-scrollbar { display: none; }
.fc {
  flex-shrink: 0; padding: 5px 13px; border-radius: 99px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; font-family: inherit; white-space: nowrap;
  transition: all .15s;
}
.fc.active { background: var(--text); color: white; border-color: var(--text); }

/* ── ADD BAR ─────────────────────────────────────────────────────── */
.add-bar { margin: 10px 16px 0; display: flex; gap: 8px; }
.add-input {
  flex: 1; padding: 11px 14px;
  border: 1.5px solid var(--border2); border-radius: var(--radius);
  background: var(--surface); font-size: 15px;
  font-family: inherit; color: var(--text); outline: none;
}
.add-input:focus { border-color: var(--blue); }
.add-btn {
  padding: 11px 16px; background: var(--text); color: white;
  border: none; border-radius: var(--radius);
  font-size: 22px; font-weight: 300; cursor: pointer;
}
.add-btn:active { opacity: .8; }
.add-opts { display: flex; gap: 6px; margin: 6px 16px 0; }
.add-opts select {
  flex: 1; padding: 7px 10px; border: 1px solid var(--border);
  border-radius: 8px; background: var(--surface); color: var(--text2);
  font-size: 12px; font-family: inherit; outline: none;
}

/* ── CONTENT ─────────────────────────────────────────────────────── */
.content {
  padding: 10px 16px;
  padding-bottom: calc(76px + var(--safe-bottom));
}

/* ── BUCKET ──────────────────────────────────────────────────────── */
.bucket {
  background: var(--surface); border-radius: 12px;
  border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden;
}
.bucket-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; cursor: pointer; user-select: none;
}
.bchev { font-size: 10px; color: var(--text3); transition: transform .2s; flex-shrink: 0; }
.bucket.collapsed .bchev { transform: rotate(-90deg); }
.bname { font-size: 13px; font-weight: 600; flex: 1; }
.bcnt  { font-size: 11px; color: var(--text3); }
.bucket-body { border-top: 1px solid var(--border); }
.bucket.collapsed .bucket-body { display: none; }

/* ── ITEM ────────────────────────────────────────────────────────── */
.item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background .1s;
}
.item:last-child { border-bottom: none; }
.item:active { background: var(--surface2); }
.check-ring {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid var(--border2); flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.check-ring:active { border-color: var(--green); transform: scale(1.1); }
.item-body { flex: 1; min-width: 0; }
.item-title { font-size: 15px; line-height: 1.35; word-break: break-word; }
.pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.pill { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
.pt-Auftrag { background: #eff6ff; color: #1d4ed8; }
.pt-Info    { background: #fef3c7; color: #92400e; }
.pt-Planen  { background: #ecfdf5; color: #065f46; }
.pt-Idee    { background: #f5f3ff; color: #5b21b6; }
.pp-hoch    { background: #fee2e2; color: #991b1b; }
.pp-mittel  { background: #fef3c7; color: #92400e; }
.pp-tief    { background: #f0fdf4; color: #166534; }
.pw { background: var(--surface2); color: var(--text2); }
.item-arrow { color: var(--text3); font-size: 18px; align-self: center; flex-shrink: 0; }
.empty { padding: 14px; font-size: 13px; color: var(--text3); text-align: center; }

/* ── BOTTOM BAR ──────────────────────────────────────────────────── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 10px 16px;
  padding-bottom: calc(10px + var(--safe-bottom));
  display: flex; gap: 8px; z-index: 100;
}
.bb-btn {
  flex: 1; padding: 10px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--surface2);
  font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; font-family: inherit; text-align: center;
}
.bb-btn:active { background: var(--border); }
.bb-btn.pri { background: var(--text); color: white; border-color: var(--text); }

/* ── SHEET ───────────────────────────────────────────────────────── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200;
}
.overlay.open { display: block; }
.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-radius: 20px 20px 0 0;
  padding-bottom: calc(20px + var(--safe-bottom));
  max-height: 92vh; overflow-y: auto; z-index: 201;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 99px; margin: 12px auto 6px; }
.sheet-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 20px 12px; border-bottom: 1px solid var(--border);
}
.sheet-hd-title { font-size: 16px; font-weight: 700; }
.close-btn {
  background: var(--surface2); border: none; width: 30px; height: 30px;
  border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text2);
  display: flex; align-items: center; justify-content: center;
}
.field { padding: 14px 20px 0; }
.flabel { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.field input, .field textarea, .field select {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 15px; font-family: inherit; color: var(--text);
  background: var(--surface2); outline: none;
}
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--blue); background: var(--surface);
}
.field textarea { resize: vertical; min-height: 70px; }
.field-row { display: flex; }
.field-row .field { flex: 1; }
.sh-actions { display: flex; gap: 8px; padding: 16px 20px 0; }
.sh-btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.sh-done   { background: var(--green); color: white; }
.sh-undone { background: var(--amber); color: white; }
.sh-delete { background: #fee2e2; color: var(--red); }

/* ── DONE MODAL ──────────────────────────────────────────────────── */
.modal {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-radius: 20px 20px 0 0;
  max-height: 80vh; overflow-y: auto; z-index: 201;
  padding-bottom: calc(20px + var(--safe-bottom));
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
}
.modal.open { transform: translateY(0); }
.modal-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; background: var(--surface);
}
.done-item { display: flex; align-items: center; gap: 10px; padding: 10px 20px; border-bottom: 1px solid var(--border); }
.done-ck { width: 22px; height: 22px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; flex-shrink: 0; }
.done-title { flex: 1; font-size: 14px; color: var(--text3); text-decoration: line-through; word-break: break-word; }
.done-acts { display: flex; gap: 5px; flex-shrink: 0; }
.sm-btn { font-size: 11px; padding: 3px 9px; border-radius: 6px; cursor: pointer; font-family: inherit; }
.sm-undone { border: 1px solid var(--border); background: none; color: var(--text2); }
.sm-del    { border: 1px solid var(--red); background: none; color: var(--red); }

/* ── CONFIG SHEET ────────────────────────────────────────────────── */
.cfg-field { margin-bottom: 12px; }
.cfg-label { font-size: 11px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--text3); margin-bottom: 5px; }
.cfg-input {
  width: 100%; padding: 10px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 14px; font-family: inherit; color: var(--text);
  background: var(--surface2); outline: none;
}
.cfg-input:focus { border-color: var(--blue); background: var(--surface); }
.cfg-status { font-size: 12px; margin-top: 8px; padding: 8px 12px; border-radius: 8px; }
.cfg-status.ok  { background: #ecfdf5; color: #065f46; }
.cfg-status.err { background: #fee2e2; color: #991b1b; }

/* ── TOAST ───────────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: calc(80px + var(--safe-bottom) + 10px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: white;
  padding: 9px 18px; border-radius: 99px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .25s;
  pointer-events: none; z-index: 500; white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SETUP SCREEN ────────────────────────────────────────────────── */
.setup-screen {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 100vh;
  padding: 40px 24px; text-align: center;
}
.setup-logo { font-size: 48px; margin-bottom: 16px; }
.setup-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.setup-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; line-height: 1.6; }
.setup-form { width: 100%; max-width: 380px; text-align: left; }
.setup-btn {
  width: 100%; padding: 14px; background: var(--text); color: white;
  border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 600; cursor: pointer; font-family: inherit;
  margin-top: 16px;
}
.setup-btn:active { opacity: .8; }
</style>
</head>
<body>

<!-- SETUP SCREEN (shown if no config) -->
<div id="setup-screen" class="setup-screen" style="display:none;">
  <div class="setup-logo">✓</div>
  <div class="setup-title">Pendenzen</div>
  <div class="setup-sub">Einmalig die Supabase-Zugangsdaten eingeben.<br>Diese werden lokal gespeichert.</div>
  <div class="setup-form">
    <div class="cfg-field">
      <div class="cfg-label">Supabase URL</div>
      <input class="cfg-input" id="setup-url" type="url" placeholder="https://xxxx.supabase.co" />
    </div>
    <div class="cfg-field">
      <div class="cfg-label">Anon Key</div>
      <textarea class="cfg-input" id="setup-key" rows="3" placeholder="eyJ..." style="font-size:11px;word-break:break-all;"></textarea>
    </div>
    <div id="setup-status"></div>
    <button class="setup-btn" onclick="saveConfig()">Verbinden & starten</button>
  </div>
</div>

<!-- MAIN APP (hidden until configured) -->
<div id="app" style="display:none;">

<!-- HEADER -->
<div class="header">
  <div class="header-row">
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="header-title">✓ Pendenzen</span>
      <span class="badge" id="badge">0</span>
    </div>
    <div class="header-right">
      <div class="sync-dot" id="sync-dot" title="Sync-Status"></div>
      <button class="icon-btn" onclick="openDoneModal()">Erledigt</button>
      <button class="icon-btn" onclick="openCfgSheet()">⚙</button>
    </div>
  </div>
  <div class="filter-strip">
    <button class="fc active" onclick="setFilter('alle',this)">Alle</button>
    <button class="fc" onclick="setFilter('Auftrag',this)">📋 Auftrag</button>
    <button class="fc" onclick="setFilter('Planen',this)">📅 Planen</button>
    <button class="fc" onclick="setFilter('Info',this)">ℹ️ Info</button>
    <button class="fc" onclick="setFilter('Idee',this)">💡 Idee</button>
  </div>
</div>

<!-- ADD -->
<div class="add-bar">
  <input class="add-input" id="add-input" type="text" placeholder="Neue Pendenz..."
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();addTask();}" />
  <button class="add-btn" onclick="addTask()">+</button>
</div>
<div class="add-opts">
  <select id="add-bucket"></select>
  <select id="add-type">
    <option value="Auftrag">📋 Auftrag</option>
    <option value="Planen">📅 Planen</option>
    <option value="Info">ℹ️ Info</option>
    <option value="Idee">💡 Idee</option>
  </select>
</div>

<!-- CONTENT -->
<div class="content" id="content"></div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="bb-btn" onclick="openDoneModal()">✓ Erledigt (<span id="done-cnt">0</span>)</button>
  <button class="bb-btn pri" onclick="loadFromSupabase()">↻ Aktualisieren</button>
</div>

</div><!-- /app -->

<!-- DETAIL SHEET -->
<div class="overlay" id="sheet-ov" onclick="closeSheet()"></div>
<div class="sheet" id="detail-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hd">
    <span class="sheet-hd-title">Pendenz bearbeiten</span>
    <button class="close-btn" onclick="closeSheet()">✕</button>
  </div>
  <div class="field"><div class="flabel">Titel</div><textarea id="d-title" rows="2" oninput="detailSave()"></textarea></div>
  <div class="field"><div class="flabel">Notizen</div><textarea id="d-notes" rows="3" oninput="detailSave()"></textarea></div>
  <div class="field-row">
    <div class="field"><div class="flabel">Prio</div>
      <select id="d-prio" onchange="detailSave()">
        <option value="hoch">🔴 Hoch</option>
        <option value="mittel">🟡 Mittel</option>
        <option value="tief">🟢 Tief</option>
      </select>
    </div>
    <div class="field"><div class="flabel">Typ</div>
      <select id="d-type" onchange="detailSave()">
        <option value="Auftrag">📋 Auftrag</option>
        <option value="Planen">📅 Planen</option>
        <option value="Info">ℹ️ Info</option>
        <option value="Idee">💡 Idee</option>
      </select>
    </div>
  </div>
  <div class="field-row">
    <div class="field"><div class="flabel">Bereich</div><select id="d-bucket" onchange="detailSave()"></select></div>
    <div class="field"><div class="flabel">Datum</div><input type="date" id="d-date" oninput="detailSave()" /></div>
  </div>
  <div class="field"><div class="flabel">Zuständig</div><input type="text" id="d-who" placeholder="Person..." oninput="detailSave()" /></div>
  <div class="sh-actions">
    <button class="sh-btn" id="d-done-btn" onclick="toggleDetailDone()">✓ Erledigt</button>
    <button class="sh-btn sh-delete" onclick="deleteDetail()">🗑</button>
  </div>
</div>

<!-- DONE MODAL -->
<div class="overlay" id="done-ov" onclick="closeDoneModal()"></div>
<div class="modal" id="done-modal">
  <div class="modal-hd">
    <span style="font-size:16px;font-weight:700;">✓ Erledigt</span>
    <div style="display:flex;gap:8px;">
      <button class="icon-btn" onclick="clearDone()" style="color:var(--red);border-color:var(--red);">Alle löschen</button>
      <button class="icon-btn" onclick="closeDoneModal()">✕</button>
    </div>
  </div>
  <div id="done-list"></div>
</div>

<!-- CONFIG SHEET -->
<div class="overlay" id="cfg-ov" onclick="closeCfgSheet()"></div>
<div class="sheet" id="cfg-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-hd">
    <span class="sheet-hd-title">⚙ Einstellungen</span>
    <button class="close-btn" onclick="closeCfgSheet()">✕</button>
  </div>
  <div style="padding:16px 20px;">
    <div class="cfg-field">
      <div class="cfg-label">Supabase URL</div>
      <input class="cfg-input" id="cfg-url" type="url" />
    </div>
    <div class="cfg-field">
      <div class="cfg-label">Anon Key</div>
      <textarea class="cfg-input" id="cfg-key" rows="3" style="font-size:11px;word-break:break-all;"></textarea>
    </div>
    <div id="cfg-status"></div>
    <button class="setup-btn" onclick="updateConfig()">Speichern & verbinden</button>
    <button onclick="resetConfig()" style="width:100%;margin-top:8px;padding:10px;background:none;border:1px solid var(--red);border-radius:var(--radius);color:var(--red);font-size:13px;cursor:pointer;font-family:inherit;">
      🗑 Zugangsdaten löschen & neu eingeben
    </button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
let SUPA_URL = '';
let SUPA_KEY = '';
let tasks = [];
let buckets = [];
let nextTaskId = 100;
let nextBucketId = 10;
let pdzFilter = 'alle';
let detailId = null;
let saveTimer = null;


function resetConfig() {
  localStorage.removeItem('pdz_supa_url');
  localStorage.removeItem('pdz_supa_key');
  SUPA_URL = ''; SUPA_KEY = '';
  closeCfgSheet();
  document.getElementById('app').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
  document.getElementById('setup-url').value = '';
  document.getElementById('setup-key').value = '';
}

function loadConfig() {
  SUPA_URL = localStorage.getItem('pdz_supa_url') || '';
  SUPA_KEY = localStorage.getItem('pdz_supa_key') || '';
  return !!(SUPA_URL && SUPA_KEY);
}

function saveConfig() {
  const url = document.getElementById('setup-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('setup-key').value.trim().replace(/\s/g, '');
  if (!url || !key) { showSetupStatus('Bitte beide Felder ausfüllen', 'err'); return; }
  SUPA_URL = url; SUPA_KEY = key;
  localStorage.setItem('pdz_supa_url', url);
  localStorage.setItem('pdz_supa_key', key);
  showSetupStatus('Verbinde...', '');
  loadFromSupabase().then(() => {
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  }).catch(e => showSetupStatus('Verbindung fehlgeschlagen: ' + e.message, 'err'));
}

function updateConfig() {
  const url = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  const key = document.getElementById('cfg-key').value.trim().replace(/\s/g, '');
  if (!url || !key) { showCfgStatus('Bitte beide Felder ausfüllen', 'err'); return; }
  SUPA_URL = url; SUPA_KEY = key;
  localStorage.setItem('pdz_supa_url', url);
  localStorage.setItem('pdz_supa_key', key);
  loadFromSupabase().then(() => { toast('✓ Verbunden'); closeCfgSheet(); })
    .catch(e => showCfgStatus('Fehler: ' + e.message, 'err'));
}

function showSetupStatus(msg, type) {
  const el = document.getElementById('setup-status');
  el.className = 'cfg-status' + (type ? ' ' + type : '');
  el.textContent = msg;
}
function showCfgStatus(msg, type) {
  const el = document.getElementById('cfg-status');
  el.className = 'cfg-status' + (type ? ' ' + type : '');
  el.textContent = msg;
}

// ═══════════════════════════════════════════════════════════════
// SUPABASE API
// ═══════════════════════════════════════════════════════════════
function supa(path, opts = {}) {
  // Custom schema requires Accept-Profile / Content-Profile headers
  return fetch(`${SUPA_URL}/rest/v1/${path}`, {
    ...opts,
    headers: {
      'apikey': SUPA_KEY,
      'Authorization': 'Bearer ' + SUPA_KEY,
      'Content-Type': 'application/json',
      'Accept-Profile': 'fw',
      'Content-Profile': 'fw',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers || {}),
    },
  });
}

function setSyncDot(state) { // 'syncing' | 'ok' | 'err'
  const d = document.getElementById('sync-dot');
  if (d) { d.className = 'sync-dot ' + state; }
}

async function loadFromSupabase() {
  setSyncDot('syncing');
  try {
    const [bRes, tRes, mRes] = await Promise.all([
      supa('buckets?order=sort_order'),
      supa('tasks?order=id'),
      supa('meta?select=key,value'),
    ]);
    if (!bRes.ok) throw new Error('Buckets: ' + bRes.status);
    if (!tRes.ok) throw new Error('Tasks: ' + tRes.status);

    const bData = await bRes.json();
    const tData = await tRes.json();
    const mData = mRes.ok ? await mRes.json() : [];

    buckets = bData.map(b => ({
      id: b.id, name: b.name,
      collapsed: b.collapsed || false,
      isIdeas: b.is_ideas || false,
    }));

    tasks = tData.map(t => ({
      id: t.id, title: t.title || '', notes: t.notes || '',
      prio: t.prio || 'mittel', type: t.type || 'Auftrag',
      who: t.who || '', date: t.date || '',
      done: t.done || false, source: t.source || '',
      bucketId: t.bucket_id,
    }));

    // If no buckets in DB yet, seed defaults
    if (buckets.length === 0) {
      await seedDefaults();
      return;
    }

    // IDs from meta
    const nti = mData.find(m => m.key === 'nextTaskId');
    const nbi = mData.find(m => m.key === 'nextBucketId');
    if (nti) nextTaskId = parseInt(nti.value) || nextTaskId;
    if (nbi) nextBucketId = parseInt(nbi.value) || nextBucketId;

    setSyncDot('ok');
    render();
  } catch(e) {
    setSyncDot('err');
    toast('⚠ Sync-Fehler: ' + e.message);
    throw e;
  }
}

async function seedDefaults() {
  const defaultBuckets = [
    { id:1, name:'SBB Basel MSL', collapsed:false, is_ideas:false, sort_order:0 },
    { id:2, name:'Team & Mitarbeitende', collapsed:false, is_ideas:false, sort_order:1 },
    { id:3, name:'Allgemein', collapsed:false, is_ideas:false, sort_order:2 },
    { id:4, name:'Ideenkatalog', collapsed:false, is_ideas:true, sort_order:3 },
  ];
  await supa('buckets', { method:'POST', body: JSON.stringify(defaultBuckets), prefer:'resolution=merge-duplicates' });
  buckets = defaultBuckets.map(b => ({ id:b.id, name:b.name, collapsed:false, isIdeas:b.is_ideas }));
  setSyncDot('ok');
  render();
}

async function saveMeta() {
  await supa('meta', {
    method: 'POST',
    prefer: 'resolution=merge-duplicates',
    body: JSON.stringify([
      { key: 'nextTaskId', value: String(nextTaskId), updated_at: new Date().toISOString() },
      { key: 'nextBucketId', value: String(nextBucketId), updated_at: new Date().toISOString() },
    ]),
  });
}

async function upsertTask(t) {
  setSyncDot('syncing');
  try {
    const row = {
      id: t.id, title: t.title, notes: t.notes,
      prio: t.prio, type: t.type, who: t.who,
      date: t.date, done: t.done, source: t.source,
      bucket_id: t.bucketId,
      updated_at: new Date().toISOString(),
    };
    const res = await supa('tasks', {
      method: 'POST',
      prefer: 'resolution=merge-duplicates',
      body: JSON.stringify(row),
    });
    if (!res.ok) throw new Error(res.status);
    await saveMeta();
    setSyncDot('ok');
  } catch(e) { setSyncDot('err'); console.warn('upsertTask', e); }
}

async function deleteTask(id) {
  setSyncDot('syncing');
  try {
    await supa(`tasks?id=eq.${id}`, { method: 'DELETE', prefer: '' });
    setSyncDot('ok');
  } catch(e) { setSyncDot('err'); }
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() {
  const open = tasks.filter(t => !t.done);
  const done = tasks.filter(t => t.done);
  document.getElementById('badge').textContent = open.length;
  document.getElementById('done-cnt').textContent = done.length;

  // bucket select
  const bs = document.getElementById('add-bucket');
  bs.innerHTML = buckets.map(b => `<option value="${b.id}">${esc(b.name)}</option>`).join('');

  let html = '';
  buckets.forEach(bucket => {
    let items = open.filter(t => t.bucketId === bucket.id);
    if (pdzFilter !== 'alle') items = items.filter(t => t.type === pdzFilter);
    const openCnt = open.filter(t => t.bucketId === bucket.id).length;
    const body = items.length === 0
      ? `<div class="empty">${pdzFilter !== 'alle' ? 'Kein Treffer für diesen Filter' : 'Keine offenen Pendenzen'}</div>`
      : items.map(renderItem).join('');
    html += `
      <div class="bucket${bucket.collapsed ? ' collapsed' : ''}" id="mob-b-${bucket.id}">
        <div class="bucket-hd" onclick="toggleBucket(${bucket.id})">
          <span class="bchev">▾</span>
          <span class="bname">${bucket.isIdeas ? '💡 ' : ''}${esc(bucket.name)}</span>
          <span class="bcnt">${openCnt} offen</span>
        </div>
        <div class="bucket-body">${body}</div>
      </div>`;
  });
  document.getElementById('content').innerHTML = html || `<div class="empty" style="padding:40px;">Keine Pendenzen</div>`;
}

function renderItem(t) {
  const tc = { Auftrag:'pt-Auftrag', Info:'pt-Info', Planen:'pt-Planen', Idee:'pt-Idee' };
  const pc = { hoch:'pp-hoch', mittel:'pp-mittel', tief:'pp-tief' };
  const notes = t.notes && t.notes.trim().length > 0;
  return `
    <div class="item" onclick="openDetail(${t.id})">
      <div class="check-ring" onclick="event.stopPropagation();markDone(${t.id})"></div>
      <div class="item-body">
        <div class="item-title">${esc(t.title)}${notes ? ' <span style="color:var(--text3);font-size:11px;">📝</span>' : ''}</div>
        <div class="pills">
          <span class="pill ${tc[t.type]||'pt-Auftrag'}">${t.type||'Auftrag'}</span>
          ${t.prio ? `<span class="pill ${pc[t.prio]||'pp-mittel'}">${t.prio.charAt(0).toUpperCase()+t.prio.slice(1)}</span>` : ''}
          ${t.who ? `<span class="pill pw">${esc(t.who)}</span>` : ''}
          ${t.date ? `<span class="pill pw">${t.date}</span>` : ''}
        </div>
      </div>
      <span class="item-arrow">›</span>
    </div>`;
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function setFilter(f, btn) {
  pdzFilter = f;
  document.querySelectorAll('.fc').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleBucket(id) {
  const b = buckets.find(b => b.id === id);
  if (b) { b.collapsed = !b.collapsed; render(); }
}

async function addTask() {
  const inp = document.getElementById('add-input');
  const title = inp.value.trim(); if (!title) return;
  const bucketId = parseInt(document.getElementById('add-bucket').value) || buckets[0]?.id || 1;
  const type = document.getElementById('add-type').value || 'Auftrag';
  const t = { id: nextTaskId++, title, notes: '', prio: 'mittel', who: '', date: '', done: false, source: 'Mobil', type, bucketId };
  tasks.unshift(t);
  inp.value = ''; inp.focus();
  render();
  await upsertTask(t);
  toast('Pendenz hinzugefügt');
}

async function markDone(id) {
  const t = tasks.find(t => t.id === id); if (!t) return;
  t.done = true;
  render();
  await upsertTask(t);
  toast('✓ Erledigt!');
}

// ── DETAIL ──────────────────────────────────────────────────────
function openDetail(id) {
  const t = tasks.find(t => t.id === id); if (!t) return;
  detailId = id;
  document.getElementById('d-title').value = t.title || '';
  document.getElementById('d-notes').value = t.notes || '';
  document.getElementById('d-prio').value  = t.prio  || 'mittel';
  document.getElementById('d-type').value  = t.type  || 'Auftrag';
  document.getElementById('d-date').value  = t.date  || '';
  document.getElementById('d-who').value   = t.who   || '';
  const bs = document.getElementById('d-bucket');
  bs.innerHTML = buckets.map(b => `<option value="${b.id}"${b.id===t.bucketId?' selected':''}>${esc(b.name)}</option>`).join('');
  const db = document.getElementById('d-done-btn');
  db.textContent = t.done ? '↩ Zurücksetzen' : '✓ Erledigt';
  db.className   = 'sh-btn ' + (t.done ? 'sh-undone' : 'sh-done');
  document.getElementById('sheet-ov').classList.add('open');
  document.getElementById('detail-sheet').classList.add('open');
}

function closeSheet() {
  document.getElementById('sheet-ov').classList.remove('open');
  document.getElementById('detail-sheet').classList.remove('open');
  detailId = null;
}

function detailSave() {
  if (!detailId) return;
  const t = tasks.find(t => t.id === detailId); if (!t) return;
  t.title    = document.getElementById('d-title').value;
  t.notes    = document.getElementById('d-notes').value;
  t.prio     = document.getElementById('d-prio').value;
  t.type     = document.getElementById('d-type').value;
  t.date     = document.getElementById('d-date').value;
  t.who      = document.getElementById('d-who').value;
  t.bucketId = parseInt(document.getElementById('d-bucket').value) || t.bucketId;
  render();
  // Debounce save
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => upsertTask(t), 800);
}

async function toggleDetailDone() {
  const t = tasks.find(t => t.id === detailId); if (!t) return;
  t.done = !t.done;
  closeSheet(); render();
  await upsertTask(t);
  toast(t.done ? '✓ Erledigt!' : '↩ Zurückgesetzt');
}

async function deleteDetail() {
  if (!confirm('Pendenz wirklich löschen?')) return;
  const id = detailId;
  tasks = tasks.filter(t => t.id !== id);
  closeSheet(); render();
  await deleteTask(id);
  toast('Gelöscht');
}

// ── DONE MODAL ───────────────────────────────────────────────────
function openDoneModal() {
  const done = tasks.filter(t => t.done);
  document.getElementById('done-list').innerHTML = done.length === 0
    ? '<div class="empty" style="padding:30px;">Keine erledigten Pendenzen 🎉</div>'
    : done.map(t => `
      <div class="done-item">
        <div class="done-ck">✓</div>
        <div class="done-title">${esc(t.title)}</div>
        <div class="done-acts">
          <button class="sm-btn sm-undone" onclick="undoneTask(${t.id})">↩</button>
          <button class="sm-btn sm-del" onclick="deleteDoneTask(${t.id})">✕</button>
        </div>
      </div>`).join('');
  document.getElementById('done-ov').classList.add('open');
  document.getElementById('done-modal').classList.add('open');
}
function closeDoneModal() {
  document.getElementById('done-ov').classList.remove('open');
  document.getElementById('done-modal').classList.remove('open');
}
async function undoneTask(id) {
  const t = tasks.find(t => t.id === id); if (!t) return;
  t.done = false; openDoneModal(); render(); await upsertTask(t);
}
async function deleteDoneTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  openDoneModal(); render(); await deleteTask(id);
}
async function clearDone() {
  if (!confirm('Alle erledigten Pendenzen wirklich löschen?')) return;
  const ids = tasks.filter(t => t.done).map(t => t.id);
  tasks = tasks.filter(t => !t.done);
  closeDoneModal(); render();
  for (const id of ids) await deleteTask(id);
  toast('Gelöscht');
}

// ── CONFIG SHEET ─────────────────────────────────────────────────
function openCfgSheet() {
  document.getElementById('cfg-url').value = SUPA_URL;
  document.getElementById('cfg-key').value = SUPA_KEY;
  document.getElementById('cfg-ov').classList.add('open');
  document.getElementById('cfg-sheet').classList.add('open');
}
function closeCfgSheet() {
  document.getElementById('cfg-ov').classList.remove('open');
  document.getElementById('cfg-sheet').classList.remove('open');
}

// ── UTILS ────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── INIT ─────────────────────────────────────────────────────────
if (loadConfig()) {
  document.getElementById('app').style.display = 'block';
  loadFromSupabase();
} else {
  document.getElementById('setup-screen').style.display = 'flex';
}
</script>
</body>
</html>
